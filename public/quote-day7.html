<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    width: 1080px; height: 1080px;
    display: flex; align-items: center; justify-content: center;
  }
  .wrap { width: 960px; text-align: center; color: white; padding: 40px 50px; }
  .tag {
    display: inline-block; background: #DC2626; color: white;
    font-size: 38px; font-weight: 700; padding: 10px 32px;
    border-radius: 30px; margin-bottom: 24px; letter-spacing: 2px;
  }
  .quote-mark { font-size: 80px; color: rgba(220,38,38,0.35); line-height: 0.5; margin-bottom: 10px; font-family: Georgia, serif; }
  .quote { font-size: 108px; font-weight: 900; line-height: 1.35; color: #ffffff; margin-bottom: 22px; letter-spacing: 3px; }
  .quote span { color: #FCA5A5; }
  .divider { width: 90px; height: 5px; background: #DC2626; margin: 0 auto 22px; border-radius: 3px; }
  .sub { font-size: 62px; color: rgba(255,255,255,0.85); line-height: 1.7; margin-bottom: 0; }
</style>
</head>
<body>
<div class="wrap">
  <div class="tag">🏠 節稅懶人包 Day 7</div>
  <div class="quote-mark">&ldquo;</div>
  <div class="quote">繼承房產<br>土地增值稅<span>完全免徵</span></div>
  <div class="divider"></div>
  <div class="sub">遺產稅免稅額高達 <strong style="color:#86EFAC">1,333萬</strong><br>繼承流程一次搞懂</div>
</div>
</body>
</html>

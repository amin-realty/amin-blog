<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    width: 1080px; height: 1080px;
    display: flex; align-items: center; justify-content: center;
  }
  .wrap { width: 960px; text-align: center; color: white; padding: 40px 50px; }
  .tag {
    display: inline-block; background: #DC2626; color: white;
    font-size: 26px; font-weight: 700; padding: 10px 32px;
    border-radius: 30px; margin-bottom: 30px; letter-spacing: 2px;
  }
  .quote-mark { font-size: 90px; color: rgba(220,38,38,0.35); line-height: 0.5; margin-bottom: 14px; font-family: Georgia, serif; }
  .quote { font-size: 80px; font-weight: 900; line-height: 1.4; color: #ffffff; margin-bottom: 28px; letter-spacing: 3px; }
  .quote span { color: #FCA5A5; }
  .divider { width: 90px; height: 5px; background: #DC2626; margin: 0 auto 28px; border-radius: 3px; }
  .sub { font-size: 36px; color: rgba(255,255,255,0.85); line-height: 1.8; margin-bottom: 36px; }
  .agent-card {
    display: flex; align-items: center; justify-content: center; gap: 28px;
    background: rgba(255,255,255,0.08); border: 1.5px solid rgba(255,255,255,0.18);
    border-radius: 22px; padding: 28px 50px;
  }
  .agent-info { text-align: center; }
  .agent-name { font-size: 36px; font-weight: 900; color: #fff; margin-bottom: 8px; }
  .agent-phone { font-size: 34px; font-weight: 700; color: #FCA5A5; margin-bottom: 6px; letter-spacing: 1px; }
  .agent-link { font-size: 24px; color: rgba(255,255,255,0.6); }
</style>
</head>
<body>
<div class="wrap">
  <div class="tag">🏠 節稅懶人包 Day 7</div>
  <div class="quote-mark">&ldquo;</div>
  <div class="quote">繼承房產
土地增值稅<span>完全免徵</span></div>
  <div class="divider"></div>
  <div class="sub">遺產稅免稅額高達 <strong style="color:#86EFAC">1,333萬</strong><br>繼承流程一次搞懂</div>
  <div class="agent-card">
    <div class="agent-info">
      <div class="agent-name">找敏姐房產通 🔑</div>
      <div class="agent-phone">📞 0988-146-299</div>
      <div class="agent-link">🌐 amin-realty.github.io</div>
    </div>
  </div>
</div>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    width: 1080px; height: 1080px;
    display: flex; align-items: center; justify-content: center;
  }
  .wrap {
    width: 880px;
    text-align: center;
    color: white;
    padding: 60px;
  }
  .tag {
    display: inline-block;
    background: #DC2626;
    color: white;
    font-size: 18px;
    font-weight: 700;
    padding: 8px 24px;
    border-radius: 30px;
    margin-bottom: 48px;
    letter-spacing: 2px;
  }
  .quote-mark {
    font-size: 120px;
    color: rgba(220,38,38,0.4);
    line-height: 0.5;
    margin-bottom: 20px;
    font-family: Georgia, serif;
  }
  .quote {
    font-size: 48px;
    font-weight: 900;
    line-height: 1.5;
    color: #ffffff;
    margin-bottom: 48px;
    letter-spacing: 1px;
  }
  .quote span {
    color: #FCA5A5;
  }
  .sub {
    font-size: 22px;
    color: rgba(255,255,255,0.7);
    line-height: 1.8;
    margin-bottom: 56px;
  }
  .divider {
    width: 80px;
    height: 4px;
    background: #DC2626;
    margin: 0 auto 40px;
    border-radius: 2px;
  }
  .brand {
    font-size: 20px;
    color: rgba(255,255,255,0.5);
    letter-spacing: 3px;
    font-weight: 500;
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="tag">🏠 節稅懶人包 Day 3</div>
  <div class="quote-mark">"</div>
  <div class="quote">
    一個時間點的差距<br>
    可能讓你<span>多繳幾十萬</span>稅金
  </div>
  <div class="divider"></div>
  <div class="sub">
    房地合一稅 2.0｜持有未滿2年稅率高達 45%<br>
    自住滿6年，400萬獲利內 <strong style="color:#86EFAC">全額免稅</strong>
  </div>
  <div class="brand">紅火房屋仲介｜雲林斗六</div>
</div>
</body>
</html>

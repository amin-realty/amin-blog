<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    width: 1080px; height: 1080px;
    display: flex; align-items: center; justify-content: center;
  }
  .wrap {
    width: 960px;
    text-align: center;
    color: white;
    padding: 40px 50px;
  }
  .tag {
    display: inline-block;
    background: #DC2626;
    color: white;
    font-size: 24px;
    font-weight: 700;
    padding: 10px 30px;
    border-radius: 30px;
    margin-bottom: 28px;
    letter-spacing: 2px;
  }
  .quote-mark {
    font-size: 90px;
    color: rgba(220,38,38,0.35);
    line-height: 0.5;
    margin-bottom: 14px;
    font-family: Georgia, serif;
  }
  .quote {
    font-size: 76px;
    font-weight: 900;
    line-height: 1.45;
    color: #ffffff;
    margin-bottom: 28px;
    letter-spacing: 3px;
  }
  .quote span { color: #FCA5A5; }
  .divider {
    width: 90px; height: 5px;
    background: #DC2626;
    margin: 0 auto 28px;
    border-radius: 3px;
  }
  .sub {
    font-size: 34px;
    color: rgba(255,255,255,0.85);
    line-height: 1.8;
    margin-bottom: 32px;
  }
  .agent-card { display: none; }
</style>
</head>
<body>
<div class="wrap">
  <div class="tag">🏠 節稅懶人包 Day 3</div>
  <div class="quote-mark">"</div>
  <div class="quote">
    一個時間點的差距<br>
    可能讓你<span>多繳幾十萬</span>稅金
  </div>
  <div class="divider"></div>
  <div class="sub">
    持有未滿2年稅率高達 <strong style="color:#FCA5A5">45%</strong><br>
    自住滿6年，400萬內 <strong style="color:#86EFAC">全額免稅</strong>
  </div>
</div>
</body>
</html>
